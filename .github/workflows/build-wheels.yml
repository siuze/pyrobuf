name: Build Wheels

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3  # 请确保版本 >= 2.21.0 以完美支持 Python 3.13
        env:
          # 仅构建 Python 3.13 (cp313)
          # 对于 Windows，指定 cp313-win_amd64
          CIBW_BUILD: "cp313-win_amd64"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-py313
          path: ./wheelhouse/*.whl
